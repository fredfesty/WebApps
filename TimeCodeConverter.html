<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timecode & Time Converter</title>
    <style>
        :root {
            --bg: #1e1e22;
            --panel: #2a2a30;
            --text: #e4e4e7;
            --border: #3f3f46;
            --accent: #0ea5e9;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding-top: 4rem;
            margin: 0;
        }
        .converter-card {
            background-color: var(--panel);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #a1a1aa;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<div class="converter-card">
    <div class="form-group">
        <label for="framerate">Frame Rate</label>
        <select id="framerate">
            <option value="23.976">23.976 fps</option>
            <option value="24">24 fps</option>
            <option value="25">25 fps</option>
            <option value="29.97NDF">29.97 fps (NDF)</option>
            <option value="29.97DF">29.97 fps (Drop Frame)</option>
            <option value="30">30 fps</option>
            <option value="50">50 fps</option>
            <option value="59.94NDF">59.94 fps (NDF)</option>
            <option value="59.94DF">59.94 fps (Drop Frame)</option>
            <option value="60">60 fps</option>
        </select>
    </div>

    <div class="form-group">
        <label for="timecode">Timecode (HH:MM:SS:FF or HH:MM:SS;FF)</label>
        <input type="text" id="timecode" placeholder="00:00:00:00">
    </div>

    <div class="form-group">
        <label for="time">Time (HH:MM:SS.FFF)</label>
        <input type="text" id="time" placeholder="00:00:00.000">
    </div>

    <div class="form-group">
        <label for="seconds">Total Seconds</label>
        <input type="number" id="seconds" placeholder="0.000" min="0" step="0.001">
    </div>

    <div class="form-group">
        <label for="frames">Total Frames</label>
        <input type="number" id="frames" placeholder="0" min="0">
    </div>
</div>

<script>
    const rates = {
        "23.976": { exact: 24000/1001, nom: 24, df: false },
        "24": { exact: 24, nom: 24, df: false },
        "25": { exact: 25, nom: 25, df: false },
        "29.97NDF": { exact: 30000/1001, nom: 30, df: false },
        "29.97DF": { exact: 30000/1001, nom: 30, df: true },
        "30": { exact: 30, nom: 30, df: false },
        "50": { exact: 50, nom: 50, df: false },
        "59.94NDF": { exact: 60000/1001, nom: 60, df: false },
        "59.94DF": { exact: 60000/1001, nom: 60, df: true },
        "60": { exact: 60, nom: 60, df: false }
    };

    const elRate = document.getElementById('framerate');
    const elTc = document.getElementById('timecode');
    const elTime = document.getElementById('time');
    const elSeconds = document.getElementById('seconds');
    const elFrames = document.getElementById('frames');

    let lastEdited = 'frames';

    function pad(num, size = 2) {
        let s = num.toString();
        while (s.length < size) s = "0" + s;
        return s;
    }

    function framesToTimecode(frames, fps, isDropFrame) {
        let f = frames;
        if (isDropFrame) {
            let drop = (fps === 30) ? 2 : (fps === 60 ? 4 : 0);
            if (drop > 0) {
                let d = Math.floor(f / (10 * 60 * fps - 9 * drop));
                let m = f % (10 * 60 * fps - 9 * drop);
                if (m > drop) {
                    f += drop * 9 * d + drop * Math.floor((m - drop) / (60 * fps - drop));
                } else {
                    f += drop * 9 * d;
                }
            }
        }
        
        let fr = f % fps;
        let s = Math.floor(f / fps) % 60;
        let mn = Math.floor(f / (fps * 60)) % 60;
        let hr = Math.floor(f / (fps * 3600));

        let sep = isDropFrame ? ';' : ':';
        return pad(hr) + ':' + pad(mn) + ':' + pad(s) + sep + pad(fr);
    }

    function timecodeToFrames(tc, fps, isDropFrame) {
        let parts = tc.split(/[:;]/).map(Number);
        if (parts.length !== 4) return NaN;
        let [h, m, s, f] = parts;
        
        let frames = (h * 3600 + m * 60 + s) * fps + f;
        
        if (isDropFrame) {
            let drop = (fps === 30) ? 2 : (fps === 60 ? 4 : 0);
            let totalMinutes = h * 60 + m;
            frames -= drop * (totalMinutes - Math.floor(totalMinutes / 10));
        }
        return frames;
    }

    function secondsToTime(sec) {
        let h = Math.floor(sec / 3600);
        let rem = sec - h * 3600;
        let m = Math.floor(rem / 60);
        rem -= m * 60;
        let s = Math.floor(rem);
        let ms = Math.round((rem - s) * 1000);
        if (ms === 1000) { ms = 0; s++; }
        if (s === 60) { s = 0; m++; }
        if (m === 60) { m = 0; h++; }
        return pad(h) + ':' + pad(m) + ':' + pad(s) + '.' + pad(ms, 3);
    }

    function timeToSeconds(timeStr) {
        let parts = timeStr.split(':');
        if (parts.length !== 3) return NaN;
        let h = parseInt(parts[0], 10);
        let m = parseInt(parts[1], 10);
        let sParts = parts[2].split('.');
        let s = parseInt(sParts[0], 10);
        let fff = sParts.length > 1 ? parseFloat('0.' + sParts[1]) : 0;
        return (h * 3600) + (m * 60) + s + fff;
    }

    function updateFromFrames() {
        let f = parseInt(elFrames.value, 10);
        if (isNaN(f)) return;
        let r = rates[elRate.value];
        let rawSec = f / r.exact;
        
        elTc.value = framesToTimecode(f, r.nom, r.df);
        elTime.value = secondsToTime(rawSec);
        elSeconds.value = rawSec.toFixed(3);
    }

    function updateFromTimecode() {
        let r = rates[elRate.value];
        let f = timecodeToFrames(elTc.value, r.nom, r.df);
        if (isNaN(f)) return;
        let rawSec = f / r.exact;
        
        elFrames.value = f;
        elTime.value = secondsToTime(rawSec);
        elSeconds.value = rawSec.toFixed(3);
    }

    function updateFromTime() {
        let sec = timeToSeconds(elTime.value);
        if (isNaN(sec)) return;
        let r = rates[elRate.value];
        let f = Math.round(sec * r.exact);
        
        elFrames.value = f;
        elTc.value = framesToTimecode(f, r.nom, r.df);
        elSeconds.value = sec.toFixed(3);
    }

    function updateFromSeconds() {
        let sec = parseFloat(elSeconds.value);
        if (isNaN(sec)) return;
        let r = rates[elRate.value];
        let f = Math.round(sec * r.exact);
        
        elFrames.value = f;
        elTc.value = framesToTimecode(f, r.nom, r.df);
        elTime.value = secondsToTime(sec);
    }

    function syncAll() {
        if (lastEdited === 'frames') updateFromFrames();
        else if (lastEdited === 'timecode') updateFromTimecode();
        else if (lastEdited === 'time') updateFromTime();
        else if (lastEdited === 'seconds') updateFromSeconds();
    }

    // Event Listeners
    elRate.addEventListener('change', syncAll);

    elFrames.addEventListener('input', () => {
        lastEdited = 'frames';
        updateFromFrames();
    });

    elSeconds.addEventListener('input', () => {
        lastEdited = 'seconds';
        updateFromSeconds();
    });

    elTc.addEventListener('input', () => {
        lastEdited = 'timecode';
        if (/^\d{1,2}:\d{2}:\d{2}[:;]\d{2}$/.test(elTc.value)) {
            updateFromTimecode();
        }
    });

    elTime.addEventListener('input', () => {
        lastEdited = 'time';
        if (/^\d{1,2}:\d{2}:\d{2}\.\d{1,3}$/.test(elTime.value)) {
            updateFromTime();
        }
    });

    // Initialize with default state
    elFrames.value = 0;
    updateFromFrames();
</script>

</body>
</html>
