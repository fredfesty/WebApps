<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qwirkle Scorekeeper</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: white;
            touch-action: manipulation; /* Improves touch response */
            overflow: hidden; /* Prevent scrolling in app mode */
        }
        
        /* Custom Scrollbar for history if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Qwirkle Colors for dynamic use */
        .q-red { color: #ff4d4d; }
        .q-orange { color: #ffad33; }
        .q-yellow { color: #ffff4d; }
        .q-green { color: #4dff4d; }
        .q-blue { color: #4d4dff; }
        .q-purple { color: #d24dff; }
        
        /* Animation for score updates */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.2s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons as inline SVGs components
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 1 0 5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconUndo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
        const IconDelete = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>;

        // Qwirkle distinct colors for players
        const PLAYER_COLORS = [
            'border-red-500 text-red-400', 
            'border-blue-500 text-blue-400', 
            'border-green-500 text-green-400', 
            'border-yellow-500 text-yellow-400'
        ];
        
        const BG_COLORS = [
            'bg-red-500/10', 
            'bg-blue-500/10', 
            'bg-green-500/10', 
            'bg-yellow-500/10'
        ];

        function App() {
            const [view, setView] = useState('setup'); // setup, game, end
            const [players, setPlayers] = useState([]);
            const [activePlayerIndex, setActivePlayerIndex] = useState(0);
            const [currentInput, setCurrentInput] = useState('0');
            const [history, setHistory] = useState([]); // Array of {playerIndex, scoreAdded}

            // --- SETUP LOGIC ---
            const handleStartGame = (playerNames) => {
                const newPlayers = playerNames.map((name, index) => ({
                    id: index,
                    name: name || `Player ${index + 1}`,
                    score: 0,
                    color: PLAYER_COLORS[index],
                    bg: BG_COLORS[index]
                }));
                setPlayers(newPlayers);
                setView('game');
                setActivePlayerIndex(0);
                setHistory([]);
                setCurrentInput('0');
            };

            // --- GAME LOGIC ---
            const handleNumberClick = (num) => {
                setCurrentInput(prev => (prev === '0' ? String(num) : prev + num));
            };

            const handleBackspace = () => {
                setCurrentInput(prev => (prev.length > 1 ? prev.slice(0, -1) : '0'));
            };

            const handleSubmitScore = () => {
                const scoreToAdd = parseInt(currentInput);
                if (isNaN(scoreToAdd) || scoreToAdd === 0) return; // Allow 0? usually not useful to log 0, but technically possible. Let's ignore 0 for UX cleanliness.

                const updatedPlayers = [...players];
                updatedPlayers[activePlayerIndex].score += scoreToAdd;
                
                // Add to history
                setHistory(prev => [...prev, { playerIndex: activePlayerIndex, scoreAdded: scoreToAdd, isBonus: false }]);

                setPlayers(updatedPlayers);
                setCurrentInput('0');
                
                // Next player
                setActivePlayerIndex((prev) => (prev + 1) % players.length);
            };

            const handleBonusFinish = () => {
                const updatedPlayers = [...players];
                updatedPlayers[activePlayerIndex].score += 6;
                
                setHistory(prev => [...prev, { playerIndex: activePlayerIndex, scoreAdded: 6, isBonus: true }]);
                setPlayers(updatedPlayers);
                
                // Usually game ends here
                setView('end');
            };

            const handleUndo = () => {
                if (history.length === 0) return;
                
                const lastAction = history[history.length - 1];
                const updatedPlayers = [...players];
                
                updatedPlayers[lastAction.playerIndex].score -= lastAction.scoreAdded;
                setPlayers(updatedPlayers);
                
                // If it wasn't a game-ending bonus, we likely want to switch the turn back
                if (!lastAction.isBonus) {
                    setActivePlayerIndex(lastAction.playerIndex);
                }
                
                setHistory(prev => prev.slice(0, -1));
                setView('game'); // Ensure we aren't stuck on end screen if we undo the finish
            };

            const handleReset = () => {
                if(confirm("Start a new game?")) {
                    setView('setup');
                    setPlayers([]);
                    setHistory([]);
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative">
                    {/* Header */}
                    <div className="flex items-center justify-between p-4 bg-slate-800 shadow-md z-10">
                        <div className="flex items-center gap-2">
                            <div className="grid grid-cols-2 gap-0.5 w-6 h-6">
                                <div className="bg-red-500 rounded-sm"></div>
                                <div className="bg-blue-500 rounded-sm"></div>
                                <div className="bg-green-500 rounded-sm"></div>
                                <div className="bg-yellow-500 rounded-sm"></div>
                            </div>
                            <h1 className="text-xl font-bold tracking-wider">Qwirkle</h1>
                        </div>
                        {view !== 'setup' && (
                            <button onClick={handleReset} className="text-slate-400 hover:text-white">
                                <IconRefresh />
                            </button>
                        )}
                    </div>

                    {/* Main Content Area - Scrollable */}
                    <div className="flex-1 overflow-y-auto no-scrollbar bg-slate-900 pb-80">
                        {view === 'setup' && <SetupScreen onStart={handleStartGame} />}
                        
                        {(view === 'game' || view === 'end') && (
                            <div className="p-4 space-y-4">
                                {/* Scoreboard */}
                                <div className="grid grid-cols-2 gap-3">
                                    {players.map((player, idx) => (
                                        <div 
                                            key={player.id}
                                            onClick={() => view === 'game' && setActivePlayerIndex(idx)}
                                            className={`
                                                relative p-4 rounded-xl border-2 transition-all duration-300
                                                ${player.bg}
                                                ${activePlayerIndex === idx && view === 'game' 
                                                    ? `border-current ${player.color} shadow-[0_0_15px_rgba(255,255,255,0.1)] scale-105 z-10` 
                                                    : 'border-slate-700 text-slate-400 opacity-80'}
                                            `}
                                        >
                                            {activePlayerIndex === idx && view === 'game' && (
                                                <div className="absolute -top-2 -right-2 bg-white text-slate-900 text-xs font-bold px-2 py-1 rounded-full animate-bounce">
                                                    TURN
                                                </div>
                                            )}
                                            <div className="flex flex-col items-center">
                                                <span className="text-sm font-semibold truncate w-full text-center mb-1">{player.name}</span>
                                                <span className="text-4xl font-bold font-mono tracking-tighter text-white">
                                                    {player.score}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Last Action / Undo Display */}
                                {history.length > 0 && view === 'game' && (
                                    <div className="flex justify-center items-center mt-2">
                                        <button 
                                            onClick={handleUndo}
                                            className="flex items-center gap-2 text-xs text-slate-500 hover:text-slate-300 bg-slate-800 px-3 py-1.5 rounded-full"
                                        >
                                            <IconUndo />
                                            Undo: {players[history[history.length-1].playerIndex].name} +{history[history.length-1].scoreAdded}
                                        </button>
                                    </div>
                                )}

                                {view === 'end' && <WinnerDisplay players={players} />}
                            </div>
                        )}
                    </div>

                    {/* Fixed Bottom Input Area */}
                    {view === 'game' && (
                        <div className="absolute bottom-0 w-full bg-slate-800 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.5)] border-t border-slate-700">
                            
                            {/* Input Display Bar */}
                            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-700">
                                <div className="text-slate-400 text-sm">Add Score</div>
                                <div className="text-3xl font-mono font-bold text-white tracking-widest">
                                    {currentInput}
                                </div>
                            </div>

                            {/* Keypad */}
                            <div className="grid grid-cols-3 gap-0.5 bg-slate-700 p-0.5 pb-safe">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                    <button 
                                        key={num}
                                        onClick={() => handleNumberClick(num)}
                                        className="h-14 bg-slate-800 text-2xl font-semibold active:bg-slate-600 text-white transition-colors"
                                    >
                                        {num}
                                    </button>
                                ))}
                                <button 
                                    onClick={handleBackspace} 
                                    className="h-14 bg-slate-800 text-slate-400 flex items-center justify-center active:bg-slate-600"
                                >
                                    <IconDelete />
                                </button>
                                <button 
                                    onClick={() => handleNumberClick(0)}
                                    className="h-14 bg-slate-800 text-2xl font-semibold active:bg-slate-600 text-white"
                                >
                                    0
                                </button>
                                <button 
                                    onClick={handleSubmitScore} 
                                    className="h-14 bg-blue-600 text-white font-bold text-lg active:bg-blue-700 flex items-center justify-center"
                                >
                                    ADD
                                </button>
                            </div>
                            
                            {/* Special Bonus Row */}
                            <div className="bg-slate-900 p-2 flex justify-center">
                                <button 
                                    onClick={handleBonusFinish}
                                    className="w-full py-3 rounded-lg border border-slate-700 text-yellow-400 text-sm font-bold uppercase tracking-wider hover:bg-slate-800 flex items-center justify-center gap-2"
                                >
                                    <IconTrophy /> Finish Game (+6 Bonus)
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function SetupScreen({ onStart }) {
            const [count, setCount] = useState(2);
            const [names, setNames] = useState(['', '', '', '']);

            const updateName = (idx, val) => {
                const newNames = [...names];
                newNames[idx] = val;
                setNames(newNames);
            };

            const handleStart = () => {
                const activeNames = names.slice(0, count).map((n, i) => n.trim() === '' ? `Player ${i+1}` : n);
                onStart(activeNames);
            };

            return (
                <div className="p-6 space-y-8 flex flex-col justify-center min-h-[50vh]">
                    <div className="text-center space-y-2">
                        <h2 className="text-2xl font-bold text-white">Game Setup</h2>
                        <p className="text-slate-400">How many people are playing?</p>
                    </div>

                    <div className="flex justify-center gap-4">
                        {[2, 3, 4].map(num => (
                            <button
                                key={num}
                                onClick={() => setCount(num)}
                                className={`
                                    w-16 h-16 rounded-2xl text-2xl font-bold border-2 transition-all
                                    ${count === num 
                                        ? 'border-blue-500 bg-blue-500/20 text-white scale-110 shadow-lg' 
                                        : 'border-slate-700 bg-slate-800 text-slate-500'}
                                `}
                            >
                                {num}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-3">
                        {Array.from({ length: count }).map((_, i) => (
                            <div key={i} className="relative">
                                <div className="absolute left-3 top-3.5 text-slate-500">
                                    <IconUser />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder={`Player ${i + 1} Name`}
                                    value={names[i]}
                                    onChange={(e) => updateName(i, e.target.value)}
                                    className="w-full bg-slate-800 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500 transition-colors"
                                />
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={handleStart}
                        className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-blue-900/50 transition-all active:scale-95"
                    >
                        Start Game
                    </button>
                </div>
            );
        }

        function WinnerDisplay({ players }) {
            // Sort copy of players by score descending
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
            const winner = sortedPlayers[0];

            return (
                <div className="mt-8 text-center space-y-6 animate-pop">
                    <div className="inline-block p-4 rounded-full bg-yellow-500/20 text-yellow-400 border-2 border-yellow-500 mb-2">
                        <IconTrophy size={48} />
                    </div>
                    <div>
                        <h2 className="text-slate-400 text-lg uppercase tracking-wide">Winner</h2>
                        <h1 className="text-4xl font-bold text-white mt-2">{winner.name}</h1>
                        <div className="text-6xl font-mono font-bold text-yellow-400 mt-4">{winner.score}</div>
                    </div>
                    
                    <div className="bg-slate-800 rounded-xl p-4 mt-8">
                        <h3 className="text-slate-500 text-sm mb-4 uppercase">Final Standings</h3>
                        {sortedPlayers.map((p, i) => (
                            <div key={p.id} className="flex justify-between items-center py-3 border-b border-slate-700 last:border-0">
                                <div className="flex items-center gap-3">
                                    <span className="text-slate-500 font-mono w-6 text-left">{i + 1}.</span>
                                    <span className={p.id === winner.id ? 'text-yellow-400 font-bold' : 'text-white'}>{p.name}</span>
                                </div>
                                <span className="font-mono font-bold text-slate-300">{p.score}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
